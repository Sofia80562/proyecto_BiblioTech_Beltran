{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Editar Libro: {{ libro.titulo }}</h2>
    <form action="{{ url_for('editar', id=libro.id) }}" method="POST" class="card p-4 shadow-sm">
        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" name="titulo" class="form-control" value="{{ libro.titulo }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Autor</label>
            <input type="text" name="autor" class="form-control" value="{{ libro.autor }}" required>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Stock</label>
                <input type="number" name="stock" class="form-control" value="{{ libro.stock }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Precio</label>
                <input type="number" step="0.01" name="precio" class="form-control" value="{{ libro.precio }}" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Actualizar Cambios</button>
        <a href="{{ url_for('inventario') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
