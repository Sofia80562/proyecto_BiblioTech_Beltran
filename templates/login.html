{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <h2>🔑 Iniciar Sesión - BiblioTech</h2>
    <p>Ingrese sus credenciales para acceder al sistema.</p>

    <form action="{{ url_for('login') }}" method="POST" class="form-login">
        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
        </div>

        <button type="submit" class="btn-submit">Entrar al Sistema</button>
    </form>

    <div class="login-footer">
        <p>¿No tienes una cuenta? <a href="{{ url_for('registrar_usuario') }}">Regístrate aquí</a></p>
    </div>
</div>
{% endblock %}
