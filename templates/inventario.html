{% extends "base.html" %}
{% block content %}
<h2>📦 Gestión de Inventario</h2>

<form action="/agregar" method="POST" style="margin-bottom: 20px; padding: 15px; background: #f9f9f9;">
    <input type="text" name="titulo" placeholder="Nombre del Libro" required>
    <input type="text" name="autor" placeholder="Autor" required>
    <input type="number" name="cantidad" placeholder="Cantidad" required>
    <input type="number" step="0.01" name="precio" placeholder="Precio" required>
    <button type="submit">Agregar Libro</button>
</form>

<table border="1" style="width:100%; border-collapse: collapse;">
    <tr style="background-color: #eee;">
        <th>ID</th>
        <th>Título</th>
        <th>Autor</th>
        <th>Stock</th>
        <th>Precio</th>
        <th>Acción</th>
    </tr>
    {% for libro in libros %}
    <tr>
        <td>{{ libro.id }}</td>
        <td>{{ libro.titulo }}</td>
        <td>{{ libro.autor }}</td>
        <td>{{ libro.cantidad }}</td>
        <td>${{ libro.precio }}</td>
        <td><a href="/eliminar/{{ libro.id }}" style="color:red;">Eliminar</a></td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
