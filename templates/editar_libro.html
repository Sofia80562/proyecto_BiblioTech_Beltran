{% extends "base.html" %}
{% block content %}
<h2>Editar Libro: {{ libro.titulo }}</h2>
<form action="/actualizar" method="POST">
    <input type="hidden" name="id" value="{{ libro.id }}">
    
    <label>Título:</label>
    <input type="text" name="titulo" value="{{ libro.titulo }}" required>
    
    <label>Autor:</label>
    <input type="text" name="autor" value="{{ libro.autor }}" required>
    
    <label>Stock Actual:</label>
    <input type="number" name="cantidad" value="{{ libro.cantidad }}" required>
    
    <label>Precio:</label>
    <input type="number" step="0.01" name="precio" value="{{ libro.precio }}" required>
    
    <label>Categoría:</label>
    <select name="categoria">
        {% for cat in categorias %}
        <option value="{{ cat.nombre_categoria }}" {% if cat.nombre_categoria == libro.nombre_categoria %}selected{% endif %}>
            {{ cat.nombre_categoria }}
        </option>
        {% endfor %}
    </select>
    
    <button type="submit">Guardar Cambios</button>
</form>
{% endblock %}
